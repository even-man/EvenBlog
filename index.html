---
layout: default
title: Home
---

<header>
  <h1>{{ site.title }}</h1>
  <p>Welcome</p>
</header>

<section>
  <h2>Posts</h2>
  <ul>
    {% for post in site.posts %}
      <li>
        <a href="{{ post.url | relative_url }}">
          {{post.title}} - {{post.date | date: "%B %d, %Y"}}
        </a>
      </li>
    {% endfor %}
  </ul>
</section>
